<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Surprise</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial,sans-serif;
            overflow:hidden;

            background:
            linear-gradient(
                135deg,
                #ff4e8a,
                #8e44ad,
                #2c3e50
            );

            position:relative;
        }

        body::before,
        body::after{
            content:"";
            position:absolute;
            border-radius:50%;
            filter:blur(100px);
            z-index:0;
        }

        body::before{
            width:300px;
            height:300px;
            background:rgba(255,215,0,.35);
            top:10%;
            left:10%;
        }

        body::after{
            width:350px;
            height:350px;
            background:rgba(255,105,180,.35);
            bottom:10%;
            right:10%;
        }

        .card{
            width:430px;
            max-width:90%;

            background:
            rgba(255,255,255,.12);

            backdrop-filter:blur(14px);

            border-radius:24px;

            padding:35px;

            text-align:center;

            box-shadow:
            0 0 40px rgba(255,255,255,.2);

            z-index:5;
        }

        .title{
            font-size:34px;
            color:#fff;
            margin-bottom:10px;
            font-weight:bold;

            text-shadow:
            0 0 12px gold;
        }

        .sub{
            color:#fff;
            margin-bottom:20px;
            font-size:16px;
        }

        .note{
            color:#ffd700;
            margin-top:10px;
            font-size:14px;
        }

        input[type=file]{
            width:100%;
            color:#fff;
            margin:20px 0;
        }

        #giftBtn{

            padding:14px 30px;

            border:none;

            border-radius:12px;

            font-size:18px;

            font-weight:bold;

            cursor:pointer;

            background:#fff;

            color:#8e44ad;

            opacity:.5;

            pointer-events:none;

            transition:.3s;
        }

        #giftBtn.active{

            opacity:1;

            pointer-events:auto;

            box-shadow:
            0 0 20px gold,
            0 0 40px hotpink;

            animation:
            glow 1s infinite alternate;
        }

        @keyframes glow{

            from{
                transform:scale(1);
            }

            to{
                transform:scale(1.06);
            }
        }

        .gift-box{

            display:none;

            position:absolute;

            width:180px;
            height:180px;

            background:#ff4e8a;

            border-radius:18px;

            box-shadow:
            0 0 25px rgba(255,255,255,.4);

            z-index:20;

            animation:pop .8s ease;
        }

        .gift-box::before{

            content:"";

            position:absolute;

            width:100%;
            height:25px;

            background:#ffd700;

            top:45%;
            left:0;
        }

        .gift-box::after{

            content:"🎀";

            position:absolute;

            font-size:60px;

            top:-35px;
            left:50%;

            transform:translateX(-50%);
        }

        .open{
            animation:explode 1.5s forwards;
        }

        @keyframes pop{

            from{
                transform:scale(0);
            }

            to{
                transform:scale(1);
            }
        }

        @keyframes explode{

            0%{
                transform:scale(1) rotate(0);
            }

            50%{
                transform:scale(1.2) rotate(10deg);
            }

            100%{
                transform:scale(4);
                opacity:0;
            }
        }

    </style>
</head>

<body>

    <div class="card" id="uploadCard">

        <div class="title">
            🎁 Your Gift
        </div>

        <div class="sub">
            Upload Your Beautiful Memories ✨
        </div>

        <input
            type="file"
            id="imageInput"
            accept="image/*"
            multiple
        >

        <div class="note">
            Upload Unlimited Images 💖
        </div>

        <br><br>

        <button id="giftBtn">
            Show Your Gift 🎂
        </button>

    </div>

    <div class="gift-box" id="giftBox"></div>

    <audio id="bgMusic" src="birthday.mp3"></audio>

<script type="module">

import { createClient }
from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabaseUrl =
'https://isddqsccsewcowfcfcnd.supabase.co'

const supabaseKey =
'sb_publishable_mAdYRN6Vtk_MyALWU90xgw_x-FxApxz'

const supabase =
createClient(
    supabaseUrl,
    supabaseKey
);

const input =
document.getElementById("imageInput");

const btn =
document.getElementById("giftBtn");

const giftBox =
document.getElementById("giftBox");

const card =
document.getElementById("uploadCard");

const music =
document.getElementById("bgMusic");

let uploadedFiles = [];

/* IMAGE SELECT */

input.addEventListener(
"change",
function(){

    uploadedFiles =
    [...this.files];

    if(uploadedFiles.length >= 1){

        btn.classList.add("active");

    }else{

        btn.classList.remove("active");
    }
});

/* BUTTON CLICK */

btn.addEventListener(
"click",
async function(){

    if(uploadedFiles.length === 0){

        alert("Upload images first");
        return;
    }

    card.style.display = "none";

    try{
        await music.play();
    }catch(e){}

    giftBox.style.display = "block";

    setTimeout(()=>{

        giftBox.classList.add("open");

    },1000);

    let imageUrls = [];

    for(const file of uploadedFiles){

        const fileName =
        Date.now() + "-" + file.name;

        const { error } =
        await supabase.storage
        .from("image")
        .upload(
            fileName,
            file
        );

        if(error){

            alert(error.message);

            console.log(error);

            return;
        }

        const { data } =
        supabase.storage
        .from("image")
        .getPublicUrl(fileName);

        imageUrls.push(
            data.publicUrl
        );
    }

    localStorage.setItem(
        "birthdayImages",
        JSON.stringify(imageUrls)
    );

    setTimeout(()=>{

        window.location.href =
        "main.html";

    },2000);
});

</script>
